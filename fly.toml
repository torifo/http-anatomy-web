# Fly.io config. State is in-memory and per-session, so run a single
# machine and keep it warm — stopping the machine drops all sessions.
app = "http-anatomy"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
