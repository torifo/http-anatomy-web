{{define "page"}}<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTMX解剖室 — Webの裏側を解剖する</title>
  <!-- 既定の htmx は 4xx/5xx を swap しない(エラー断片が画面に出ない)。
       教材としてエラー応答も可視化するため、4xx/5xx も swap するよう上書きする。 -->
  <meta name="htmx-config" content='{"responseHandling":[{"code":"204","swap":false},{"code":"[23]..","swap":true},{"code":"[45]..","swap":true,"error":true}]}'>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    .theme-dark { --bg:#0f1419; --panel:#171c24; --line:#2a323d; --fg:#d6dde6; --muted:#7d8b9a; --accent:#4fd1c5; --req:#f6ad55; --res:#68d391; --err:#fc8181; }
    .theme-light { --bg:#f7f8fa; --panel:#ffffff; --line:#d9dee5; --fg:#1b2430; --muted:#5a6b7b; --accent:#0d9488; --req:#b45309; --res:#15803d; --err:#b91c1c; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:14px 20px; border-bottom:1px solid var(--line); }
    header h1 { margin:0; font-size:16px; display:flex; align-items:center; }
    .theme-toggle { margin-left:auto; background:var(--panel); color:var(--fg); border:1px solid var(--line); padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px; }
    .theme-toggle:hover { border-color:var(--accent); }
    header p { margin:4px 0 0; color:var(--muted); font-size:12px; }
    .panes { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); min-height:calc(100vh - 64px); }
    .pane { background:var(--bg); padding:18px; overflow:auto; }
    .pane h2 { margin:0 0 12px; font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .tabs { display:flex; gap:8px; margin-bottom:14px; }
    .tabs button { background:var(--panel); color:var(--fg); border:1px solid var(--line); padding:6px 14px; border-radius:6px; cursor:pointer; }
    .tabs button:hover { border-color:var(--accent); }
    form.add { display:flex; gap:8px; margin-bottom:14px; }
    input { background:var(--panel); border:1px solid var(--line); color:var(--fg); padding:7px 10px; border-radius:6px; }
    input:focus { outline:none; border-color:var(--accent); }
    button { font:inherit; }
    .add button, .row button { background:var(--panel); color:var(--fg); border:1px solid var(--line); padding:6px 10px; border-radius:6px; cursor:pointer; }
    .add button:hover, .row button:hover { border-color:var(--accent); }
    ul.list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
    li.row { display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    li.row.done span.title { text-decoration:line-through; color:var(--muted); }
    li.row .title { flex:1; }
    li.row input.edit { flex:1; }
    .inspector .exchange { border:1px solid var(--line); border-radius:8px; margin-bottom:16px; overflow:hidden; }
    .inspector .req, .inspector .res { padding:10px 12px; }
    .inspector .req { background:#1b1e1a; border-bottom:1px solid var(--line); }
    .inspector .req strong { color:var(--req); }
    .inspector .res strong { color:var(--res); }
    .inspector pre { margin:6px 0 0; white-space:pre-wrap; word-break:break-word; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--fg); }
    .inspector .body-label { margin-top:10px; font-size:11px; color:var(--muted); }
    .inspector pre.body { background:#0b0e12; border:1px solid var(--line); border-radius:6px; padding:8px; color:var(--accent); }
    .inspector .empty { color:var(--muted); }
    .inspector ol.history { margin:8px 0 0; padding-left:18px; color:var(--muted); font:12px/1.7 ui-monospace,monospace; }
    .inspector .method { color:var(--req); }
    .inspector .status { color:var(--res); }
    .error { background:#2a1b1b; border:1px solid var(--err); color:var(--err); border-radius:8px; padding:8px 10px; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; vertical-align:middle; margin-left:8px; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .htmx-indicator { opacity:0; transition:opacity 150ms; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity:1; }
    .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    .toolbar input[name=q] { flex:1; min-width:120px; }
    .filters { display:flex; gap:4px; }
    .filter { background:var(--panel); color:var(--muted); border:1px solid var(--line); padding:5px 10px; border-radius:6px; cursor:pointer; }
    .filter:hover { border-color:var(--accent); }
    .filter.active { color:var(--accent); border-color:var(--accent); }
    .summary { color:var(--muted); font-size:12px; margin-bottom:8px; list-style:none; }
    #toasts { position:fixed; right:16px; bottom:16px; display:flex; flex-direction:column; gap:8px; z-index:50; }
    .toast { background:var(--panel); border:1px solid var(--accent); color:var(--fg); padding:10px 14px; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.4); animation:toast-in .2s ease-out; }
    @keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="theme-{{.Theme}}">
  <header>
    <h1>HTMX解剖室<span id="global-spinner" class="spinner htmx-indicator" aria-hidden="true"></span>
      <button class="theme-toggle" hx-get="/theme/toggle" title="テーマ切替 (Cookie + HX-Redirect)">🌓 テーマ</button>
    </h1>
    <p>Webの裏側を解剖する。HTMLだけで画面の複数箇所を完全同期するHATEOAS体感教材。</p>
  </header>
  <div class="panes" hx-indicator="#global-spinner">
    <section class="pane left">
      <div class="tabs">
        <button hx-get="/fragments/todos" hx-target="#resource-pane" hx-swap="outerHTML">Todos</button>
        <button hx-get="/fragments/users" hx-target="#resource-pane" hx-swap="outerHTML">Users</button>
      </div>
      {{template "todos" .Todos}}
    </section>
    <section class="pane right inspector">
      {{template "inspector" .Inspector}}
    </section>
  </div>
  <div id="toasts" aria-live="polite"></div>
  <script>
    // サーバが返す `HX-Trigger: {"showToast":{"kind":"..."}}` で発火するイベント。
    // クライアントの状態管理ではなく、レスポンスヘッダ駆動の通知デモ。
    var TOAST_TEXT = { created: "作成しました", replaced: "全置換しました (PUT)", deleted: "削除しました" };
    document.body.addEventListener("showToast", function (e) {
      var kind = (e.detail && e.detail.kind) || "";
      var el = document.createElement("div");
      el.className = "toast";
      el.textContent = TOAST_TEXT[kind] || "OK";
      document.getElementById("toasts").appendChild(el);
      setTimeout(function () { el.remove(); }, 2600);
    });
  </script>
</body>
</html>{{end}}
